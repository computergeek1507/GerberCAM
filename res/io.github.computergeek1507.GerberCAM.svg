<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- PCB board background -->
  <rect x="8" y="8" width="112" height="112" rx="8" ry="8" fill="#1a7a1a" stroke="#0d4d0d" stroke-width="3"/>

  <!-- Copper traces -->
  <line x1="24" y1="40" x2="64" y2="40" stroke="#d4a017" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="40" x2="64" y2="72" stroke="#d4a017" stroke-width="5" stroke-linecap="round"/>
  <line x1="64" y1="72" x2="104" y2="72" stroke="#d4a017" stroke-width="5" stroke-linecap="round"/>
  <line x1="24" y1="88" x2="48" y2="88" stroke="#d4a017" stroke-width="5" stroke-linecap="round"/>
  <line x1="48" y1="88" x2="48" y2="56" stroke="#d4a017" stroke-width="5" stroke-linecap="round"/>
  <line x1="80" y1="40" x2="104" y2="40" stroke="#d4a017" stroke-width="5" stroke-linecap="round"/>

  <!-- Pads -->
  <circle cx="24" cy="40" r="8" fill="#d4a017" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="24" cy="40" r="3.5" fill="#1a7a1a"/>

  <circle cx="104" cy="40" r="8" fill="#d4a017" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="104" cy="40" r="3.5" fill="#1a7a1a"/>

  <circle cx="104" cy="72" r="8" fill="#d4a017" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="104" cy="72" r="3.5" fill="#1a7a1a"/>

  <circle cx="24" cy="88" r="8" fill="#d4a017" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="24" cy="88" r="3.5" fill="#1a7a1a"/>

  <circle cx="48" cy="56" r="6" fill="#d4a017" stroke="#b8860b" stroke-width="1.5"/>
  <circle cx="48" cy="56" r="2.5" fill="#1a7a1a"/>

  <!-- Toolpath indicator (dashed line around a pad) -->
  <circle cx="104" cy="72" r="14" fill="none" stroke="#ff4444" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- CAM crosshair -->
  <line x1="80" y1="88" x2="80" y2="104" stroke="#ff4444" stroke-width="2"/>
  <line x1="72" y1="96" x2="88" y2="96" stroke="#ff4444" stroke-width="2"/>
  <circle cx="80" cy="96" r="6" fill="none" stroke="#ff4444" stroke-width="1.5"/>
</svg>
