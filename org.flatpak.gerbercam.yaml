app-id: org.flatpak.gerbercam
runtime: org.kde.Platform
runtime-version: "5.15-23.08"
sdk: org.kde.Sdk
command: GerberCAM
finish-args:
  - --share=ipc
  - --device=dri
  - --socket=fallback-x11
  - --socket=wayland
  - --share=network
  - --filesystem=xdg-documents
  - --env=PATH=/app/bin:/usr/bin
modules:
  - name: gerbercam
    buildsystem: cmake-ninja
    builddir: true
    config-opts:
      - -DCMAKE_BUILD_TYPE=RelWithDebInfo
    build-options:
      build-args:
        - --share=network
    sources:
      - type: dir
        path: .
